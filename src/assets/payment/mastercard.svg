<svg width="780" height="500" viewBox="0 0 780 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Mastercard symbol-only mark (the official small-use construction): red and yellow circles
       with the orange intersection. Official palette #EB001B / #F79E1B / #FF5F00, white ground.
       The wordmark is omitted deliberately: it is illegible at checkout-icon sizes. -->
  <path d="M780 0H0V500H780V0Z" fill="white"/>
  <circle cx="314" cy="250" r="148" fill="#EB001B"/>
  <circle cx="466" cy="250" r="148" fill="#F79E1B"/>
  <clipPath id="mc-left"><circle cx="314" cy="250" r="148"/></clipPath>
  <circle cx="466" cy="250" r="148" fill="#FF5F00" clip-path="url(#mc-left)"/>
</svg>
